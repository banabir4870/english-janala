<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>English Janala | Best Platform For Learning English</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- font awesome for icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind and daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- style sheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- navbar -->
    <nav class="bg-[#badeff42] border-b-2 border-b-gray-200">
        <div class="w-11/12 mx-auto navbar">
            <div class="navbar-start">
                <a class="flex gap-1 items-center text-xl font-bold">English <img src="assets/logo.png" alt=""> <span
                        class="font-bangla font-semibold">জানালা</span> </a>
            </div>
            <div class="navbar-end gap-4">
                <a class="btn btn-outline btn-primary text-sm font-semibold"><i
                        class="fa-solid fa-circle-question"></i>FAQ</a>
                <a class="btn btn-outline btn-primary text-sm font-semibold"><i
                        class="fa-solid fa-book-open"></i>Learn</a>
                <a class="btn btn-outline btn-primary text-sm font-semibold"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </div>
    </nav>
    <!-- banner -->
    <section class="w-11/12 mx-auto flex justify-between items-center gap-28 mt-12">
        <!-- left side -->
        <div class="space-y-6 flex-1">
            <h1 class="text-5xl font-bold"><span class="text-sky-400">English</span> is Easy!!</h1>
            <p class="font-bangla text-2xl font-medium text-neutral/70">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি
                যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
            </p>
            <div class="log-in block space-y-5">
                <input class="px-3 py-2 border-gray-300 rounded-md text-sm" type="text" name="" id=""
                    placeholder="Enter Your Name">
                <br>
                <input class="px-3 py-2 border-gray-300 rounded-md text-sm" type="password" name="" id=""
                    placeholder="Enter Your Password">
                <br>
                <button class="btn btn-primary">Get Started</button>
            </div>
        </div>
        <!-- right side -->
        <div class="flex-1">
            <img src="assets/hero-student.png" alt="">
        </div>
    </section>
    <!-- let's learn section -->
    <section>
        <h1 class="text-4xl font-bold text-center"><span class="text-sky-400">Let's</span> Learn Vocabularies</h1>
        <div id="level-container" class="flex gap-5 justify-center my-10 flex-wrap"></div>
    </section>
    <!-- search -->
    <section>
        <div class="join flex justify-center items-center my-4">
            <div>
                <label class="input validator join-item">
                    <input id="input-search" type="text" placeholder="Search Words Here"/>
                </label>
            </div>
            <button id="btn-search" class="btn btn-primary join-item">Search</button>
        </div>
    </section>
    <!-- loading -->
    <section id="spinner" class="flex justify-center items-center py-10 gap-4 hidden">
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-xs"></span>
    </section>
    <!-- show lessons after selection level section -->
    <section id="word-container" class="w-11/12 mx-auto rounded-3xl bg-gray-100 p-10 mb-10 grid grid-cols-3 gap-8">
        <div class="text-center col-span-full space-y-3">
            <p class="text-sm font-bangla text-gray-600">আপনি এখনো কোন Lesson Select করেন নি</p>
            <p class="text-3xl font-medium font-bangla">একটি Lesson Select করুন।</p>
        </div>
    </section>

    <!-- modal -->
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-4">
            </div>
            <div class="modal-action justify-start">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Complete Learning</button>
                </form>
            </div>
        </div>
    </dialog>



    <!-- script -->
    <script src="script/index.js"></script>
</body>

</html>
